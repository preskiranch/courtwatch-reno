name: Production smoke

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-smoke
  cancel-in-progress: true

jobs:
  courtwatch-core:
    name: Court Watch core
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Verify web, API, database, and event catalog
        run: node scripts/smoke-production.mjs
        env:
          SMOKE_SCOPE: core

  exposure-source:
    name: Exposure source connectivity (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Provider reachability must remain visible without reporting the healthy
    # Court Watch stack itself as failed.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - name: Verify Exposure relay can reach the official source
        run: node scripts/smoke-production.mjs
        env:
          SMOKE_SCOPE: provider
